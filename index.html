<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonic Dash Mini-Game</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #001122;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: white;
            overflow: hidden;
        }

        #game-box {
            position: relative;
            width: 600px;
            height: 300px;
            background: linear-gradient(to bottom, #4da6ff, #99ccff 70%, #008000 70%, #8b5a2b 75%);
            border: 4px solid #0055ff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0, 85, 255, 0.5);
        }

        /* Nuvens ao fundo */
        .cloud {
            position: absolute;
            background: white;
            width: 80px;
            height: 30px;
            border-radius: 20px;
            top: 40px;
            animation: moveLeft 8s linear infinite;
        }

        /* Chão quadriculado simulado */
        #floor-grid {
            position: absolute;
            bottom: 0;
            width: 200%;
            height: 90px;
            background-image: linear-gradient(45deg, #5c3a21 25%, transparent 25%), 
                              linear-gradient(-45deg, #5c3a21 25%, transparent 25%), 
                              linear-gradient(45deg, transparent 75%, #4a2f1a 75%), 
                              linear-gradient(-45deg, transparent 75%, #4a2f1a 75%);
            background-size: 30px 30px;
            animation: scrollBackground 0.5s linear infinite;
        }

        /* O Sonic (Representação Visual Animada) */
        #sonic {
            position: absolute;
            left: 50px;
            bottom: 85px;
            width: 40px;
            height: 40px;
            background: #0055ff;
            border-radius: 50%;
            border: 3px solid white;
            box-shadow: -5px 0 0 #ffcc00; /* Sapato do Sonic */
            transition: transform 0.1s;
        }

        /* Animação de corrida do Sonic */
        .running {
            animation: spin 0.2s linear infinite;
        }

        /* Obstáculo Terrestre (Motobug) */
        #obstacle {
            position: absolute;
            right: -40px;
            bottom: 85px;
            width: 35px;
            height: 35px;
            background: #ff3333;
            border-radius: 6px;
            border: 2px solid black;
        }

        /* HUD */
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            font-weight: bold;
            font-size: 1.2rem;
            text-shadow: 2px 2px black;
        }

        #game-over-screen {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* Controles públicos */
        #controls {
            margin-top: 20px;
            display: flex;
            gap: 20px;
        }

        .btn {
            background: #0055ff;
            color: white;
            border: 2px solid #00aaff;
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            box-shadow: 0 4px 0 #002288;
        }

        .btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        @keyframes moveLeft {
            from { right: -100px; }
            to { right: 700px; }
        }

        @keyframes scrollBackground {
            from { transform: translateX(0); }
            to { transform: translateX(-30px); }
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <h2 style="margin-bottom: 10px;">🦔 SONIC ACTION DASH 🦔</h2>
    <p style="margin-bottom: 15px; color: #aaa;">Desvie dos Badniks vermelhos correndo pela Green Hill!</p>

    <div id="game-box">
        <div class="cloud" style="top: 30px; animation-duration: 10s;"></div>
        <div class="cloud" style="top: 70px; animation-duration: 6s; right: 200px;"></div>
        <div id="floor-grid"></div>
        
        <div id="sonic" class="running"></div>
        <div id="obstacle"></div>

        <div id="hud">SCORE: <span id="score">0</span></div>

        <div id="game-over-screen">
            <h1 style="color: #ff3333; margin-bottom: 10px;">💥 GAME OVER 💥</h1>
            <button class="btn" onclick="resetGame()">TENTAR DE NOVO</button>
        </div>
    </div>

    <div id="controls">
        <button class="btn" onclick="jump()">PULAR ⬆️</button>
    </div>

    <script>
        const sonic = document.getElementById("sonic");
        const obstacle = document.getElementById("obstacle");
        const scoreLabel = document.getElementById("score");
        const gameOverScreen = document.getElementById("game-over-screen");

        let score = 0;
        let isJumping = false;
        let isGameOver = false;
        let obstacleSpeed = 5;
        let obstaclePosition = 600;

        // Loop principal do Jogo
        function gameLoop() {
            if (isGameOver) return;

            // Movimenta o obstáculo para a esquerda
            obstaclePosition -= obstacleSpeed;
            if (obstaclePosition < -40) {
                obstaclePosition = 600; // Reseta posição
                score += 10;
                scoreLabel.innerText = score;
                // Aumenta a velocidade gradualmente
                if (obstacleSpeed < 12) obstacleSpeed += 0.5;
            }
            obstacle.style.left = obstaclePosition + "px";

            // Lógica de Colisão simples
            let sonicBottom = parseInt(window.getComputedStyle(sonic).getPropertyValue("bottom"));
            
            // Se o obstáculo chegar perto do Sonic e o Sonic não estiver alto o suficiente
            if (obstaclePosition > 50 && obstaclePosition < 90 && sonicBottom <= 110) {
                endGame();
            }

            requestAnimationFrame(gameLoop);
        }

        // Função de Pular
        function jump() {
            if (isJumping || isGameOver) return;
            isJumping = true;
            sonic.classList.remove("running"); // Para de girar no ar
            
            // Sobe
            sonic.style.transform = "translateY(-100px)";
            sonic.style.bottom = "185px";

            // Desce após 500 milissegundos
            setTimeout(() => {
                sonic.style.transform = "translateY(0)";
                sonic.style.bottom = "85px";
                setTimeout(() => {
                    if (!isGameOver) sonic.classList.add("running");
                    isJumping = false;
                }, 100);
            }, 400);
        }

        function endGame() {
            isGameOver = true;
            gameOverScreen.style.display = "flex";
            sonic.classList.remove("running");
        }

        function resetGame() {
            score = 0;
            obstacleSpeed = 5;
            obstaclePosition = 600;
            isGameOver = false;
            gameOverScreen.style.display = "none";
            sonic.classList.add("running");
            scoreLabel.innerText = score;
            gameLoop();
        }

        // Atalho no teclado também (Barra de Espaço pula)
        document.addEventListener("keydown", (event) => {
            if (event.code === "Space") {
                jump();
            }
        });

        // Inicia o jogo
        gameLoop();
    </script>
</body>
</html>
