<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sonic Dash Mini-Game - Versão Ajustada</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #001122;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: white;
            overflow: hidden;
        }

        #game-box {
            position: relative;
            width: 600px;
            height: 300px;
            background: linear-gradient(to bottom, #4da6ff, #99ccff 70%, #008000 70%, #8b5a2b 75%);
            border: 4px solid #0055ff;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0, 85, 255, 0.5);
        }

        .cloud {
            position: absolute;
            background: white;
            width: 80px;
            height: 30px;
            border-radius: 20px;
            top: 40px;
            animation: moveLeft 12s linear infinite; /* Nuvens mais lentas */
        }

        #floor-grid {
            position: absolute;
            bottom: 0;
            width: 200%;
            height: 90px;
            background-image: linear-gradient(45deg, #5c3a21 25%, transparent 25%), 
                              linear-gradient(-45deg, #5c3a21 25%, transparent 25%), 
                              linear-gradient(45deg, transparent 75%, #4a2f1a 75%), 
                              linear-gradient(-45deg, transparent 75%, #4a2f1a 75%);
            background-size: 30px 30px;
            animation: scrollBackground 0.8s linear infinite; /* Chão correndo mais suave */
        }

        #sonic {
            position: absolute;
            left: 50px;
            bottom: 85px;
            width: 40px;
            height: 40px;
            background: #0055ff;
            border-radius: 50%;
            border: 3px solid white;
            box-shadow: -5px 0 0 #ffcc00; 
            transition: transform 0.12s ease-out;
        }

        .running {
            animation: spin 0.3s linear infinite; /* Rotação do Sonic mais suave */
        }

        #obstacle {
            position: absolute;
            right: -40px;
            bottom: 85px;
            width: 35px;
            height: 35px;
            background: #ff3333;
            border-radius: 6px;
            border: 2px solid black;
        }

        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            font-weight: bold;
            font-size: 1.2rem;
            text-shadow: 2px 2px black;
        }

        #game-over-screen {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #controls {
            margin-top: 20px;
            display: flex;
            gap: 20px;
        }

        .btn {
            background: #0055ff;
            color: white;
            border: 2px solid #00aaff;
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            border-radius: 8px;
            box-shadow: 0 4px 0 #002288;
        }

        .btn:active {
            transform: translateY(4px);
            box-shadow: none;
        }

        @keyframes moveLeft {
            from { right: -100px; }
            to { right: 700px; }
        }

        @keyframes scrollBackground {
            from { transform: translateX(0); }
            to { transform: translateX(-30px); }
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <h2 style="margin-bottom: 10px;">🦔 SONIC ACTION DASH 🦔</h2>
    <p style="margin-bottom: 15px; color: #aaa;">Versão Ajustada: Ritmo mais tranquilo!</p>

    <div id="game-box">
        <div class="cloud" style="top: 30px; animation-duration: 14s;"></div>
        <div class="cloud" style="top: 70px; animation-duration: 9s; right: 200px;"></div>
        <div id="floor-grid"></div>
        
        <div id="sonic" class="running"></div>
        <div id="obstacle"></div>

        <div id="hud">SCORE: <span id="score">0</span></div>

        <div id="game-over-screen">
            <h1 style="color: #ff3333; margin-bottom: 10px;">💥 GAME OVER 💥</h1>
            <button class="btn" onclick="resetGame()">TENTAR DE NOVO</button>
        </div>
    </div>

    <div id="controls">
        <button class="btn" onclick="jump()">PULAR ⬆️</button>
    </div>

    <script>
        const sonic = document.getElementById("sonic");
        const obstacle = document.getElementById("obstacle");
        const scoreLabel = document.getElementById("score");
        const gameOverScreen = document.getElementById("game-over-screen");

        let score = 0;
        let isJumping = false;
        let isGameOver = false;
        
        // MUDANÇAS DE VELOCIDADE AQUI:
        let initialSpeed = 3.5;  // Começava em 5, agora começa bem mais calmo em 3.5
        let obstacleSpeed = initialSpeed;
        let obstaclePosition = 600;

        function gameLoop() {
            if (isGameOver) return;

            obstaclePosition -= obstacleSpeed;
            if (obstaclePosition < -40) {
                obstaclePosition = 600; 
                score += 10;
                scoreLabel.innerText = score;
                
                // O jogo acelera muito menos a cada ponto feito:
                if (obstacleSpeed < 7.5) obstacleSpeed += 0.2; 
            }
            obstacle.style.left = obstaclePosition + "px";

            let sonicBottom = parseInt(window.getComputedStyle(sonic).getPropertyValue("bottom"));
            
            // Margem de colisão ligeiramente ajustada para ser mais justa
            if (obstaclePosition > 52 && obstaclePosition < 88 && sonicBottom <= 110) {
                endGame();
            }

            requestAnimationFrame(gameLoop);
        }

        function jump() {
            if (isJumping || isGameOver) return;
            isJumping = true;
            sonic.classList.remove("running"); 
            
            // O pulo dura um pouquinho mais para dar tempo de desviar fácil
            sonic.style.transform = "translateY(-105px)";
            sonic.style.bottom = "190px";

            setTimeout(() => {
                sonic.style.transform = "translateY(0)";
                sonic.style.bottom = "85px";
                setTimeout(() => {
                    if (!isGameOver) sonic.classList.add("running");
                    isJumping = false;
                }, 100);
            }, 450); // Tempo no ar suavemente estendido
        }

        function endGame() {
            isGameOver = true;
            gameOverScreen.style.display = "flex";
            sonic.classList.remove("running");
        }

        function resetGame() {
            score = 0;
            obstacleSpeed = initialSpeed;
            obstaclePosition = 600;
            isGameOver = false;
            gameOverScreen.style.display = "none";
            sonic.classList.add("running");
            scoreLabel.innerText = score;
            gameLoop();
        }

        document.addEventListener("keydown", (event) => {
            if (event.code === "Space") {
                jump();
            }
        });

        gameLoop();
    </script>
</body>
</html>
